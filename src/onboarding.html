<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="welcomeTitle">Welcome to BirdTab!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: #0a0a0a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .onboarding-container {
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="onboarding-container">
        <div class="onboarding-card">
            <div class="card-glow"></div>
            
            <div class="hero-section">
                <div class="logo-mark">
                    <img src="icons/icon128.png" alt="BirdTab" width="48" height="48" class="logo-icon">
                </div>
                <h1 data-i18n="welcomeTitle">Welcome to BirdTab!</h1>
                <p class="hero-text" data-i18n="welcomeDescription1">Discover a stunning bird with every new tab. Beautiful photography, fascinating facts, and soothing nature sounds from around the world.</p>
            </div>

            <div class="preview-section">
                <img src="images/birdtab-demo.jpg" data-i18n-alt="demoImageAlt" alt="BirdTab demo" class="demo-image" width="400" height="225">
            </div>

            <div class="setting-section">
                <div class="toggle-container">
                    <div class="toggle-text">
                        <div class="toggle-label">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M9 18V5l12-2v13"/>
                                <circle cx="6" cy="18" r="3"/>
                                <circle cx="18" cy="16" r="3"/>
                            </svg>
                            <span data-i18n="autoPlayBirdCalls">Auto-play bird calls</span>
                        </div>
                        <p class="help-text" data-i18n="autoPlayNote">Hear bird songs each time you open a new tab. You can adjust this anytime in settings.</p>
                    </div>
                    <label class="switch" data-i18n-title="autoPlayTooltip" title="Enable to automatically play bird calls when you open a new tab">
                        <input type="checkbox" id="autoplay-toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <button id="finish-btn" class="start-btn">
                <span data-i18n="startBirding">Start Birding!</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"/>
                    <polyline points="12 5 19 12 12 19"/>
                </svg>
            </button>
        </div>
    </div>
</body>
</html>
